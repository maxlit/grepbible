stages:
  - test
  - static
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/uv

.python-base:
  image: python:3.13
  before_script:
    - python -V
    - pip install --progress-bar off uv
    - uv sync --no-editable

mypy:
  stage: static
  extends: .python-base
  allow_failure: true
  script:
    - pip install mypy
    - python -m mypy */*.py
  when: manual

flake8:
  stage: static
  extends: .python-base
  allow_failure: true
  script:
    - pip install flake8
    - flake8 --max-line=120 */*.py
  when: manual

pylint:
  stage: static
  extends: .python-base
  allow_failure: true
  script:
    - pip install pylint
    - mkdir ./pylint
    - pylint --output-format=text */*.py | tee ./pylint/pylint.log || pylint-exit $?
    - PYLINT_SCORE=$(sed -n 's/^Your code has been rated at \([-0-9.]*\)\/.*/\1/p' ./pylint/pylint.log)
    - anybadge --label=Pylint --file=pylint/pylint.svg --value=$PYLINT_SCORE 2=red 4=orange 8=yellow 10=green
    - echo "Pylint score is $PYLINT_SCORE"
  when: manual
  artifacts:
    paths:
      - ./pylint/

test:
  stage: test
  extends: .python-base
  script:
    - uv run python -m unittest $(find tests -name "test_*.py" ! -name "test_rag.py")

build-package:
  stage: build
  extends: .python-base
  script:
    - uv build
  artifacts:
    paths:
      - dist/*.whl
      - dist/*.tar.gz

release-package:
  stage: release
  extends: .python-base
  only:
    - tags
  script:
    - uv build
    - pip install twine
    - TWINE_PASSWORD=${PYPI_PASSWORD} TWINE_USERNAME=${PYPI_USERNAME} python -m twine upload --repository pypi dist/* --verbose

test-ml-install:
  stage: test
  extends: .python-base
  script:
    - apt-get update && apt-get install -y build-essential gcc
    - pip install -v grepbible[ml]
    - python -c "from grepbible.rag import query_rag; print('ML dependencies successfully installed')"
    - gbib --rag
    - pip install pytest
    - python -m pytest tests/test_rag.py -v
  when: manual
  allow_failure: true
